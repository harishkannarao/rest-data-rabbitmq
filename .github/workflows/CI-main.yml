name: 'CI-main'

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature-*

jobs:
  main-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # default 360
    steps:
    - uses: actions/checkout@v4
    - name: Install Java 25
      uses: actions/setup-java@v1
      with:
        java-version: '25'
        java-package: jdk
        architecture: x64
    - name: Cache maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-cache-master-v4
        restore-keys: |
          ${{ runner.os }}-maven-cache-master-v4
    - name: 'CI Build Command'
      timeout-minutes: 20
      run: |
        ./ci-build.sh